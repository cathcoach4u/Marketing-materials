<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feelings Chart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #6366f1;
      --primary-light: #eef2ff;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Wheel ────────────────────────────────────────────────── */
    .wheel-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    canvas#wheel {
      cursor: pointer;
      border-radius: 50%;
      max-width: 100%;
    }

    .wheel-hint {
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Input area ───────────────────────────────────────────── */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feeling-group {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      background: #f9fafb;
    }

    .feeling-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .core-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .feeling-group-header span {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .sub-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sub-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .sub-tag:hover { border-color: var(--primary); color: var(--primary); }
    .sub-tag.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── My Feelings ──────────────────────────────────────────── */
    .my-feelings-card { grid-column: 1 / -1; }

    .selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 48px;
    }

    .selected-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      animation: pop 0.2s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .selected-pill button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
    }
    .selected-pill button:hover { color: #fff; }

    .empty-msg {
      color: var(--muted);
      font-size: 0.88rem;
      align-self: center;
    }

    /* ── Full list ────────────────────────────────────────────── */
    .full-list-card { grid-column: 1 / -1; }

    .full-list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .full-list-group h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .full-list-group ul {
      list-style: none;
    }

    .full-list-group ul li {
      font-size: 0.82rem;
      color: var(--muted);
      padding: 2px 0;
      cursor: pointer;
      transition: color 0.1s;
    }

    .full-list-group ul li:hover { color: var(--text); }
    .full-list-group ul li.selected { color: var(--primary); font-weight: 600; }

    /* custom input */
    .custom-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .custom-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-row input:focus { border-color: var(--primary); }
    .custom-row button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .custom-row button:hover { opacity: 0.85; }

    .clear-btn {
      margin-top: 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--muted);
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<header>
  <h1>Feelings Chart</h1>
  <p>Tap a feeling to add it to your list. Build, explore, and reflect.</p>
</header>

<div class="layout">

  <!-- Wheel -->
  <div class="card wheel-wrap">
    <canvas id="wheel" width="420" height="420"></canvas>
    <p class="wheel-hint">Click any segment to select that feeling</p>
  </div>

  <!-- Tag picker -->
  <div class="card">
    <h2>Browse &amp; Select Feelings</h2>
    <div class="input-area" id="tagPicker"></div>
    <div class="custom-row" style="margin-top:16px;">
      <input id="customInput" type="text" placeholder="Add your own feeling…" maxlength="40" />
      <button onclick="addCustom()">Add</button>
    </div>
  </div>

  <!-- My feelings -->
  <div class="card my-feelings-card">
    <h2>My Feelings Right Now</h2>
    <div class="selected-list" id="selectedList">
      <span class="empty-msg">Nothing selected yet — choose feelings above or from the wheel.</span>
    </div>
    <button class="clear-btn" onclick="clearAll()">Clear all</button>
  </div>

  <!-- Full list -->
  <div class="card full-list-card">
    <h2>Full Feelings List</h2>
    <div class="full-list-grid" id="fullList"></div>
  </div>

</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const CORE = [
  {
    label: "Joyful",
    color: "#facc15",
    subs: ["Excited","Elated","Happy","Content","Amused","Playful","Optimistic","Proud","Grateful","Hopeful","Inspired","Peaceful"]
  },
  {
    label: "Loving",
    color: "#f472b6",
    subs: ["Affectionate","Caring","Compassionate","Warm","Tender","Adoring","Devoted","Safe","Connected","Intimate","Trusting","Accepted"]
  },
  {
    label: "Surprised",
    color: "#a78bfa",
    subs: ["Amazed","Astonished","Startled","Shocked","Confused","Puzzled","Curious","Bewildered","Awe-struck","Disbelieving","Speechless","Wonder"]
  },
  {
    label: "Fearful",
    color: "#60a5fa",
    subs: ["Anxious","Worried","Scared","Overwhelmed","Nervous","Insecure","Helpless","Vulnerable","Doubtful","Threatened","Panicked","Dread"]
  },
  {
    label: "Sad",
    color: "#818cf8",
    subs: ["Unhappy","Lonely","Grieving","Hurt","Regretful","Hopeless","Bored","Disappointed","Depressed","Empty","Heartbroken","Powerless"]
  },
  {
    label: "Angry",
    color: "#f97316",
    subs: ["Frustrated","Irritated","Annoyed","Furious","Bitter","Resentful","Envious","Jealous","Disgusted","Hostile","Impatient","Contemptuous"]
  },
  {
    label: "Disgusted",
    color: "#4ade80",
    subs: ["Repulsed","Revolted","Appalled","Judgmental","Avoidant","Nauseous","Uncomfortable","Disapproving","Offended","Horrified","Scornful","Withdrawn"]
  },
  {
    label: "Ashamed",
    color: "#fb923c",
    subs: ["Guilty","Embarrassed","Humiliated","Remorseful","Inadequate","Inferior","Worthless","Exposed","Self-conscious","Regretful","Mortified","Apologetic"]
  }
];

const selected = new Set();

// ── Wheel ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const cx = W / 2, cy = H / 2;
const OUTER_R = W / 2 - 4;
const INNER_R = OUTER_R * 0.38;
const SLICE = (2 * Math.PI) / CORE.length;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lighten(hex, amt) {
  const {r,g,b} = hexToRgb(hex);
  const clamp = v => Math.min(255, v + amt);
  return `rgb(${clamp(r)},${clamp(g)},${clamp(b)})`;
}

function drawWheel(hoveredCore = -1, hoveredSub = -1) {
  ctx.clearRect(0, 0, W, H);

  CORE.forEach((core, i) => {
    const startAngle = i * SLICE - Math.PI / 2;
    const endAngle = startAngle + SLICE;
    const subCount = core.subs.length;
    const subSlice = SLICE / subCount;

    // Draw sub-segments (outer ring)
    core.subs.forEach((sub, j) => {
      const sa = startAngle + j * subSlice;
      const ea = sa + subSlice;
      const isHov = hoveredCore === i && hoveredSub === j;
      const isSel = selected.has(sub);

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, OUTER_R, sa, ea);
      ctx.closePath();
      ctx.fillStyle = isSel ? lighten(core.color, -30) : isHov ? lighten(core.color, 20) : lighten(core.color, 60);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // sub label
      const midAngle = sa + subSlice / 2;
      const labelR = (INNER_R + OUTER_R) / 2 + OUTER_R * 0.05;
      const tx = cx + labelR * Math.cos(midAngle);
      const ty = cy + labelR * Math.sin(midAngle);
      ctx.save();
      ctx.translate(tx, ty);
      ctx.rotate(midAngle + Math.PI / 2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `${isSel ? "bold " : ""}9px sans-serif`;
      ctx.fillStyle = isSel ? "#fff" : "#374151";
      ctx.fillText(sub, 0, 0);
      ctx.restore();
    });

    // Core segment (inner ring)
    const isHovCore = hoveredCore === i && hoveredSub === -1;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, INNER_R, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = isHovCore ? lighten(core.color, 20) : core.color;
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Core label
    const midAngle = startAngle + SLICE / 2;
    const tx = cx + (INNER_R * 0.65) * Math.cos(midAngle);
    const ty = cy + (INNER_R * 0.65) * Math.sin(midAngle);
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = "bold 10px sans-serif";
    ctx.fillStyle = "#1f2937";
    ctx.fillText(core.label, 0, 0);
    ctx.restore();
  });

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.strokeStyle = "#e5e7eb";
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = "bold 10px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#6b7280";
  ctx.fillText("How do", cx, cy - 6);
  ctx.fillText("I feel?", cx, cy + 7);
}

function hitTest(mx, my) {
  const dx = mx - cx, dy = my - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > OUTER_R || dist < 10) return null;
  let angle = Math.atan2(dy, dx) + Math.PI / 2;
  if (angle < 0) angle += 2 * Math.PI;
  const coreIdx = Math.floor(angle / SLICE) % CORE.length;
  if (dist <= INNER_R) return { coreIdx, subIdx: -1 };
  const core = CORE[coreIdx];
  const subCount = core.subs.length;
  const subSlice = SLICE / subCount;
  const startAngle = coreIdx * SLICE;
  let relAngle = angle - startAngle;
  if (relAngle < 0) relAngle += 2 * Math.PI;
  const subIdx = Math.floor(relAngle / subSlice) % subCount;
  return { coreIdx, subIdx };
}

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const hit = hitTest(mx, my);
  if (hit) {
    canvas.style.cursor = "pointer";
    drawWheel(hit.coreIdx, hit.subIdx);
  } else {
    canvas.style.cursor = "default";
    drawWheel();
  }
});

canvas.addEventListener("mouseleave", () => drawWheel());

canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const hit = hitTest(mx, my);
  if (!hit) return;
  if (hit.subIdx === -1) {
    // toggle all subs of that core
    const core = CORE[hit.coreIdx];
    const allSel = core.subs.every(s => selected.has(s));
    core.subs.forEach(s => allSel ? selected.delete(s) : selected.add(s));
  } else {
    const feeling = CORE[hit.coreIdx].subs[hit.subIdx];
    selected.has(feeling) ? selected.delete(feeling) : selected.add(feeling);
  }
  refresh();
  drawWheel(hit.coreIdx, hit.subIdx);
});

// ── Tag picker ────────────────────────────────────────────────────────────────
function buildTagPicker() {
  const container = document.getElementById("tagPicker");
  container.innerHTML = "";
  CORE.forEach(core => {
    const group = document.createElement("div");
    group.className = "feeling-group";

    const header = document.createElement("div");
    header.className = "feeling-group-header";
    const dot = document.createElement("div");
    dot.className = "core-dot";
    dot.style.background = core.color;
    const label = document.createElement("span");
    label.textContent = core.label;
    header.appendChild(dot);
    header.appendChild(label);

    const tags = document.createElement("div");
    tags.className = "sub-tags";
    core.subs.forEach(sub => {
      const tag = document.createElement("span");
      tag.className = "sub-tag" + (selected.has(sub) ? " selected" : "");
      tag.textContent = sub;
      tag.dataset.feeling = sub;
      tag.addEventListener("click", () => toggleFeeling(sub, core.color));
      tags.appendChild(tag);
    });

    group.appendChild(header);
    group.appendChild(tags);
    container.appendChild(group);
  });
}

// ── Full list ─────────────────────────────────────────────────────────────────
function buildFullList() {
  const container = document.getElementById("fullList");
  container.innerHTML = "";
  CORE.forEach(core => {
    const group = document.createElement("div");
    group.className = "full-list-group";

    const h3 = document.createElement("h3");
    const dot = document.createElement("div");
    dot.className = "core-dot";
    dot.style.background = core.color;
    dot.style.width = "10px";
    dot.style.height = "10px";
    h3.appendChild(dot);
    h3.appendChild(document.createTextNode(core.label));

    const ul = document.createElement("ul");
    core.subs.forEach(sub => {
      const li = document.createElement("li");
      li.textContent = sub;
      li.dataset.feeling = sub;
      li.className = selected.has(sub) ? "selected" : "";
      li.addEventListener("click", () => toggleFeeling(sub, core.color));
      ul.appendChild(li);
    });

    group.appendChild(h3);
    group.appendChild(ul);
    container.appendChild(group);
  });
}

// ── Selected pills ────────────────────────────────────────────────────────────
const customColors = {};

function renderSelected() {
  const list = document.getElementById("selectedList");
  list.innerHTML = "";
  if (selected.size === 0) {
    list.innerHTML = '<span class="empty-msg">Nothing selected yet — choose feelings above or from the wheel.</span>';
    return;
  }
  selected.forEach(feeling => {
    const color = customColors[feeling] || colorForFeeling(feeling);
    const pill = document.createElement("div");
    pill.className = "selected-pill";
    pill.style.background = color;
    pill.innerHTML = `${feeling}<button title="Remove" onclick="removeFeeling('${feeling.replace(/'/,"\\'")}')">×</button>`;
    list.appendChild(pill);
  });
}

function colorForFeeling(feeling) {
  for (const core of CORE) {
    if (core.subs.includes(feeling)) return core.color;
  }
  return "#6366f1";
}

function toggleFeeling(feeling, color) {
  if (selected.has(feeling)) selected.delete(feeling);
  else selected.add(feeling);
  if (color) customColors[feeling] = color;
  refresh();
}

function removeFeeling(feeling) {
  selected.delete(feeling);
  refresh();
}

function addCustom() {
  const input = document.getElementById("customInput");
  const val = input.value.trim();
  if (!val) return;
  selected.add(val);
  input.value = "";
  refresh();
}

document.getElementById("customInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addCustom();
});

function clearAll() {
  selected.clear();
  refresh();
}

function refresh() {
  renderSelected();
  buildTagPicker();
  buildFullList();
  drawWheel();
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildTagPicker();
buildFullList();
drawWheel();
</script>
</body>
</html>
